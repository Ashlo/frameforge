<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Frameforge Demo Companion</title>
    <style>
      :root {
        --bg: #0e141d;
        --bg-soft: #131c28;
        --line: rgba(169, 191, 223, 0.24);
        --text: #ebf2ff;
        --subtle: #b9c8e0;
        --accent: #1ea08a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 280px;
        background: linear-gradient(180deg, var(--bg), #0a1119);
        color: var(--text);
        font: 13px/1.35 "Avenir Next", "Segoe UI", sans-serif;
        padding: 12px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 14px;
      }

      p {
        margin: 0;
        color: var(--subtle);
      }

      .panel {
        border: 1px solid var(--line);
        background: var(--bg-soft);
        border-radius: 10px;
        padding: 10px;
        display: grid;
        gap: 8px;
      }

      .status {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
      }

      .status strong {
        display: block;
        margin-bottom: 3px;
      }

      .status span {
        color: #8ce4d4;
        font-weight: 700;
      }

      .buttons {
        display: grid;
        gap: 6px;
      }

      button {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-weight: 700;
        padding: 8px;
        cursor: pointer;
      }

      button.primary {
        background: linear-gradient(180deg, #2cc7aa, var(--accent));
        color: #0a1f1a;
        border-color: rgba(44, 199, 170, 0.7);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Frameforge Demo Companion</h1>
      <p>Arm the current tab as your demo input source.</p>

      <div class="status">
        <strong>Source Status</strong>
        <span id="sourceStatus">loading...</span>
      </div>

      <div class="buttons">
        <button id="armCurrentTabBtn" class="primary">Arm Current Tab</button>
        <button id="disarmBtn">Disarm Source</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
